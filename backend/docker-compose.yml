version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: secure_pass
      POSTGRES_DB: calendar_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
volumes:
  pg_data: